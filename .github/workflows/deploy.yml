name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e

            echo "📂 Pulling latest main..."
            cd /root/cladly
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "🔥 Configuring firewall..."
            if command -v ufw &>/dev/null; then
                ufw allow 22/tcp 2>/dev/null || true
                ufw allow 80/tcp 2>/dev/null || true
                ufw allow 443/tcp 2>/dev/null || true
                echo "y" | ufw enable 2>/dev/null || true
                echo "✅ UFW configured"
            else
                echo "⚠️  ufw not found — checking iptables..."
                iptables -C INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || iptables -I INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || true
                iptables -C INPUT -p tcp --dport 443 -j ACCEPT 2>/dev/null || iptables -I INPUT -p tcp --dport 443 -j ACCEPT 2>/dev/null || true
                echo "✅ iptables rules added"
            fi

            echo "🌐 Setting up Caddy..."
            if ! command -v caddy &>/dev/null; then
                echo "📦 Installing Caddy..."
                apt-get update -qq && apt-get install -y -qq debian-keyring debian-archive-keyring apt-transport-https curl
                curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg 2>/dev/null
                curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list >/dev/null
                apt-get update -qq && apt-get install -y -qq caddy
                echo "✅ Caddy installed"
            fi

            cat > /etc/caddy/Caddyfile << 'CADDYEOF'
            cladly.in, www.cladly.in {
                reverse_proxy localhost:8000
            }
            CADDYEOF

            systemctl enable caddy 2>/dev/null || true
            systemctl restart caddy 2>/dev/null || caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true
            echo "✅ Caddy configured and started"

            echo "🔐 Creating .env.prod..."
            cat > /root/cladly/.env.prod << 'ENVEOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=0
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_USE_TLS=${{ secrets.EMAIL_USE_TLS }}
            EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            ENVEOF

            echo "🔍 Verifying .env.prod was created..."
            if [ ! -s /root/cladly/.env.prod ]; then
                echo "❌ .env.prod is empty or missing!"
                exit 1
            fi
            grep -q 'DATABASE_URL' /root/cladly/.env.prod || { echo "❌ DATABASE_URL missing from .env.prod"; exit 1; }
            grep -q 'SECRET_KEY' /root/cladly/.env.prod || { echo "❌ SECRET_KEY missing from .env.prod"; exit 1; }

            echo "🚀 Rebuilding Docker containers..."
            cd /root/cladly
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d --build

            echo "⏳ Waiting for app to be healthy..."
            HEALTHY=false
            for i in $(seq 1 30); do
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ 2>/dev/null || true)
                echo "  Attempt $i/30 — HTTP $HTTP_CODE"
                if echo "$HTTP_CODE" | grep -qE '200|302'; then
                    echo "✅ App is up!"
                    HEALTHY=true
                    break
                fi
                sleep 2
            done

            if [ "$HEALTHY" != "true" ]; then
                echo "❌ App failed to start after 60s!"
                echo "--- Docker logs (last 50 lines) ---"
                docker compose logs web --tail 50
                echo "--- End logs ---"
                exit 1
            fi

            echo "🔧 Reloading Caddy..."
            if command -v caddy &>/dev/null; then
                caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true
                echo "✅ Caddy reloaded"
            else
                echo "⚠️  Caddy not found — skipping"
            fi

            echo "✅ Deployment complete!"
