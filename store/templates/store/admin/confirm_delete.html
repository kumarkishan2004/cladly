{% extends 'store/admin/base_admin.html' %}
{% block title %}Delete {{ type }} — Cladly Admin{% endblock %}
{% block admin_content %}
<div style="max-width:480px;margin:60px auto;text-align:center;">
  <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
  <h2 style="font-family:var(--font-display);color:var(--error);margin-bottom:8px;">Delete {{ type }}</h2>
  <p style="color:var(--text-secondary);margin-bottom:24px;">
    Are you sure you want to delete <strong style="color:var(--text-primary);">{{ object }}</strong>?<br>
    This action cannot be undone.
  </p>
  <form method="post" style="display:flex;gap:12px;justify-content:center;">
    {% csrf_token %}
    <button type="submit" class="btn" style="background:var(--error);color:white;">Yes, Delete</button>
    <a href="javascript:history.back()" class="btn btn-dark">Cancel</a>
  </form>
</div>
{% endblock %}
