{% extends 'base.html' %}
{% block title %}Edit Profile — Cladly{% endblock %}
{% block content %}
<div class="user-page">
  <div style="max-width:540px;">
    <h1 style="font-family:var(--font-display);font-size:1.4rem;margin-bottom:24px;">Edit Profile</h1>
    <div style="background:var(--black-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group"><label class="form-label">Full Name</label>{{ form.full_name }}</div>
        <div class="form-group"><label class="form-label">Mobile Number</label>{{ form.mobile }}</div>
        <div class="form-group">
          <label class="form-label">Profile Photo</label>
          {% if user.profile_image %}
            <div style="margin-bottom:8px;"><img src="{{ user.profile_image.url }}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);"></div>
          {% endif %}
          {{ form.profile_image }}
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button type="submit" class="btn btn-gold">Save Changes</button>
          <a href="{% url 'profile' %}" class="btn btn-dark">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
