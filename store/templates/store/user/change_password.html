{% extends 'base.html' %}
{% block title %}Change Password — Cladly{% endblock %}
{% block content %}
<div class="user-page">
  <div style="max-width:480px;">
    <h1 style="font-family:var(--font-display);font-size:1.4rem;margin-bottom:24px;">Change Password</h1>
    <div style="background:var(--black-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;">
      <form method="post">
        {% csrf_token %}
        <div class="form-group"><label class="form-label">Current Password</label><input type="password" name="current_password" class="form-control" placeholder="Your current password"></div>
        <div class="form-group"><label class="form-label">New Password</label><input type="password" name="new_password" class="form-control" placeholder="At least 8 characters"></div>
        <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" name="confirm_password" class="form-control" placeholder="Repeat new password"></div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button type="submit" class="btn btn-gold">Update Password</button>
          <a href="{% url 'profile' %}" class="btn btn-dark">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
